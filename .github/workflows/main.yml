name: Build Windows App
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build
        run: pyinstaller app.spec
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Windows-App
          path: dist/
